<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mzansi Fast Foods - Best South African fast food menu with Boerie Burgers, Flame-Grilled Chicken, and local favourites. Order online in ZAR.">
  <meta name="keywords" content="fast food South Africa, boerie burger, flame grilled chicken, mzansi meals, fast food delivery">
  <title>Best South Africa Fast Food Menu & Restaurants | Mzansi Fast Foods</title>
  <link rel="canonical" href="https://mzansifastfoods.co.za">
  <meta property="og:title" content="Mzansi Fast Foods - South Africa's Favourite Fast Food Hub">
  <meta property="og:description" content="Discover Boerie Burgers, Peri-Peri Chicken and more.">
  <meta property="og:image" content="https://picsum.photos/id/1080/1200/630">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FoodEstablishment",
    "name": "Mzansi Fast Foods",
    "address": {
      "@type": "PostalAddress",
      "addressCountry": "ZA"
    },
    "servesCuisine": "Fast Food, South African"
  }
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="nav-container">
      <div class="logo">Mzansi Fast Foods</div>
      <nav>
        <a href="#" onclick="showSection('menu')">Menu</a>
        <a href="#" onclick="showSection('locations')">Restaurants</a>
        <a href="http://mcdocoffeemenu.com/" target="_blank" rel="noopener noreferrer">Coffee Menu</a>
      </nav>
    </div>
  </header>

  <main>
    <!-- Menu Section -->
    <section id="menu-section">
      <div class="hero">Mzansi Fast Foods</div>
      <div class="controls">
        <input type="text" id="searchInput" placeholder="Search menu..." onkeyup="filterMenu()">
        <div id="categoryFilters" class="category-filters"></div>
      </div>
      <div id="menuGrid" class="menu-grid"></div>
    </section>

    <!-- Locations -->
    <section id="locations-section" class="locations">
      <h2>Find Us Across South Africa</h2>
      <div class="locations-grid">
        <div class="location-card">Johannesburg • Sandton</div>
        <div class="location-card">Cape Town • V&A Waterfront</div>
        <div class="location-card">Durban • Gateway</div>
      </div>
      <a href="https://hungrymzansi.co.za/" target="_blank" rel="noopener noreferrer" class="external-btn">Browse all on Hungry Mzansi →</a>
    </section>
  </main>

  <footer>
    <p>© 2026 Mzansi Fast Foods South Africa</p>
    <a href="#" onclick="showModal('privacy')">Privacy Policy</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
